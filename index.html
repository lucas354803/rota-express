<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Rota Express Entregas</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#0b0b0b;color:white}
    .app{max-width:460px;margin:auto;padding:16px}
    .top{background:linear-gradient(135deg,#ffd21f,#ff9900);color:#111;border-radius:24px;padding:20px;margin-bottom:14px}
    .top h1{margin:0;font-size:28px}.top p{margin:5px 0 0;font-weight:bold}
    .card{background:white;color:#111;border-radius:22px;padding:18px;margin-bottom:14px}
    input,textarea,select{width:100%;padding:13px;margin:6px 0;border-radius:14px;border:1px solid #ddd;font-size:15px}
    textarea{resize:none;height:70px}
    button,a.btn{width:100%;border:0;border-radius:15px;padding:13px;font-size:15px;font-weight:800;margin-top:8px;text-align:center;text-decoration:none;display:block;cursor:pointer}
    .main{background:#111;color:#ffd21f}.yellow{background:#ffd21f;color:#111}.blue{background:#2563eb;color:white}.green{background:#16a34a;color:white}.red{background:#e11d48;color:white}.gray{background:#333;color:white}
    .hide{display:none}
    .badge{display:inline-block;border-radius:999px;padding:6px 10px;background:#ffd21f;color:#111;font-size:12px;font-weight:bold;margin:5px 0}
    .order{background:#1c1c1c;border:1px solid #333;border-radius:22px;padding:16px;margin-bottom:12px}
    .order h3{margin:8px 0;color:#ffd21f;font-size:25px}.order p{margin:7px 0;color:#ddd}
    .stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
    .stat{background:white;color:#111;border-radius:18px;padding:15px}.stat span{font-size:12px;color:#666;font-weight:bold}.stat b{display:block;font-size:22px;margin-top:5px}
    .small{font-size:13px;color:#aaa}.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .pixbox{background:#eee;border-radius:16px;padding:14px;margin:10px 0;color:#111;word-break:break-word}
    .pixvalue{font-size:30px;font-weight:900;color:#111;margin:8px 0}
    .loading{opacity:.7;font-size:13px;margin:10px 0}
  </style>
</head>
<body>
<div class="app">
  <div class="top">
    <h1>🏍️ Rota Express</h1>
    <p>Entregas rápidas na rota certa</p>
  </div>

  <section id="loginArea" class="card">
    <h2>Acessar painel</h2>
    <select id="loginTipo">
      <option value="cliente">Cliente</option>
      <option value="motoboy">Motoboy</option>
      <option value="admin">Admin</option>
    </select>
    <input id="loginUser" placeholder="Usuário / telefone">
    <input id="loginSenha" type="text" placeholder="Código de acesso">
    <button class="main" onclick="entrar()">Entrar</button>
    <button class="yellow" onclick="abrirCadastroCliente()">Cadastrar cliente</button>
    <button class="gray" onclick="abrirCadastroMotoboy()">Cadastrar motoboy</button>
    <p class="small">Dados salvos online no Supabase.</p>
  </section>

  <section id="cadastroCliente" class="card hide">
    <h2>Cadastrar cliente</h2>
    <input id="cadCliNome" placeholder="Nome">
    <input id="cadCliTel" placeholder="WhatsApp / usuário">
    <input id="cadCliSenha" type="text" placeholder="Código de acesso">
    <button class="main" onclick="salvarCliente()">Salvar cliente</button>
    <button class="gray" onclick="voltarLogin()">Voltar</button>
  </section>

  <section id="cadastroMotoboy" class="card hide">
    <h2>Cadastrar motoboy</h2>
    <input id="cadMotNome" placeholder="Nome">
    <input id="cadMotWhats" placeholder="WhatsApp / usuário">
    <input id="cadMotPix" placeholder="Chave Pix do motoboy">
    <input id="cadMotSenha" type="text" placeholder="Código de acesso">
    <button class="main" onclick="salvarMotoboy()">Salvar motoboy</button>
    <button class="gray" onclick="voltarLogin()">Voltar</button>
  </section>

  <section id="sistema" class="hide">
    <button class="red" onclick="sair()">Sair</button>
    <div id="clienteArea" class="hide"></div>
    <div id="adminArea" class="hide"></div>
    <div id="motoboyArea" class="hide"></div>
  </section>
</div>

<script>
const SUPABASE_URL = "https://dbindrrbdllfozqvmawx.supabase.co";
const SUPABASE_KEY = "sb_publishable_w8lHZFJkXNGcyoThKTjdIA_FtOQ3uG4";
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const TAXA_ROTA = 20;
const PIX_ROTA = "48999117385";
const PIX_NOME = "LUCAS ALVES FERNANDES";

let sessao = JSON.parse(localStorage.getItem("rota_sessao_online")) || null;
let clientes = [];
let motoboys = [];
let pedidos = [];

function dinheiro(v){return Number(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"})}
function calcular(km){
  km = Number(km || 0);
  if(km <= 0) return 0;
  if(km <= 3) return 8;
  if(km <= 6) return 10;
  return Math.ceil(10 + (km - 6) * 2);
}
function hoje(){return new Date().toISOString().slice(0,10)}
function hora(){return new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"})}

function showOnly(id){
  ["loginArea","cadastroCliente","cadastroMotoboy","sistema"].forEach(x=>document.getElementById(x).classList.add("hide"));
  document.getElementById(id).classList.remove("hide");
}
function abrirCadastroCliente(){showOnly("cadastroCliente")}
function abrirCadastroMotoboy(){showOnly("cadastroMotoboy")}
function voltarLogin(){showOnly("loginArea")}

async function carregarDados(){
  const { data: usuarios, error: errUsuarios } = await db.from("usuarios").select("*").order("id", {ascending:false});
  const { data: listaPedidos, error: errPedidos } = await db.from("pedidos").select("*").order("id", {ascending:false});

  if(errUsuarios || errPedidos){
    console.error(errUsuarios || errPedidos);
    alert("Erro ao carregar dados. Confira se as tabelas existem e se o RLS está desativado.");
    return;
  }

  clientes = (usuarios || []).filter(u => u.tipo === "cliente");
  motoboys = (usuarios || []).filter(u => u.tipo === "motoboy");
  pedidos = listaPedidos || [];
}

async function salvarCliente(){
  let nome = cadCliNome.value.trim(), tel = cadCliTel.value.trim(), senha = cadCliSenha.value.trim();
  if(!nome || !tel || !senha){alert("Preencha todos os campos");return}

  const { error } = await db.from("usuarios").insert({nome, telefone: tel, senha, tipo:"cliente"});
  if(error){alert("Erro ao cadastrar cliente: " + error.message); return;}

  alert("Cliente cadastrado");
  cadCliNome.value = ""; cadCliTel.value = ""; cadCliSenha.value = "";
  voltarLogin();
  await carregarDados();
}

async function salvarMotoboy(){
  let nome = cadMotNome.value.trim(), whats = cadMotWhats.value.trim(), pix = cadMotPix.value.trim(), senha = cadMotSenha.value.trim();
  if(!nome || !whats || !pix || !senha){alert("Preencha todos os campos");return}

  const { error } = await db.from("usuarios").insert({nome, telefone: whats, senha, tipo:"motoboy", pix});
  if(error){alert("Erro ao cadastrar motoboy: " + error.message); return;}

  alert("Motoboy cadastrado");
  cadMotNome.value = ""; cadMotWhats.value = ""; cadMotPix.value = ""; cadMotSenha.value = "";
  voltarLogin();
  await carregarDados();
}

async function entrar(){
  let tipo = loginTipo.value, user = loginUser.value.trim(), senha = loginSenha.value.trim();

  if(tipo==="admin" && user==="admin" && senha==="1234"){
    sessao={tipo:"admin",nome:"Administrador",id:"admin"};
    localStorage.setItem("rota_sessao_online", JSON.stringify(sessao));
    await carregarDados();
    render();
    return;
  }

  const { data, error } = await db.from("usuarios")
    .select("*")
    .eq("telefone", user)
    .eq("senha", senha)
    .eq("tipo", tipo)
    .maybeSingle();

  if(error || !data){
    alert(tipo==="cliente" ? "Cliente não encontrado" : "Motoboy não encontrado");
    return;
  }

  sessao={tipo:data.tipo,nome:data.nome,id:data.id,tel:data.telefone,whats:data.telefone,pix:data.pix || ""};
  localStorage.setItem("rota_sessao_online", JSON.stringify(sessao));
  await carregarDados();
  render();
}

function sair(){
  sessao=null;
  localStorage.removeItem("rota_sessao_online");
  render();
}

function blocoPixPedido(p){
  return `
    <div class="pixbox">
      <b>Pagamento via Pix</b><br>
      <div class="pixvalue">${dinheiro(p.valor)}</div>
      Chave Pix: <b>${PIX_ROTA}</b><br>
      Nome: <b>${PIX_NOME}</b><br>
      <button class="yellow" onclick="copiar('${PIX_ROTA}')">Copiar chave Pix</button>
      <p class="small">Após pagar, envie o comprovante e aguarde o admin confirmar.</p>
    </div>`;
}

async function criarPedidoCliente(){
  let loja = document.getElementById("loja").value.trim();
  let coleta = document.getElementById("coleta").value.trim();
  let entrega = document.getElementById("entrega").value.trim();
  let km = document.getElementById("km").value;
  let obs = document.getElementById("obs").value.trim();
  if(!coleta || !entrega || !km){alert("Preencha coleta, entrega e KM");return}

  const novoPedido = {
    cliente_id:sessao.id,
    cliente_nome:sessao.nome,
    cliente_telefone:sessao.tel || sessao.whats || "",
    loja:loja || sessao.nome,
    coleta,
    entrega,
    km:Number(km),
    valor:calcular(km),
    obs,
    pagamento_status:"Aguardando confirmação",
    status:"Aguardando admin aprovar",
    liberado:false,
    motoboy_id:null,
    motoboy_nome:"",
    pago_motoboy:false
  };

  const { error } = await db.from("pedidos").insert(novoPedido);
  if(error){alert("Erro ao criar pedido: " + error.message); return;}

  await carregarDados();
  render();
  alert("Pedido criado. Pague o valor mostrado no Pix e aguarde o admin confirmar.");
}

async function confirmarPix(id){
  const { error } = await db.from("pedidos").update({pagamento_status:"Pix confirmado"}).eq("id", id);
  if(error){alert("Erro: " + error.message); return;}
  await carregarDados(); render();
}

async function liberarPedido(id){
  const p = pedidos.find(x=>x.id===id);
  if(p && p.pagamento_status !== "Pix confirmado"){alert("Confirme o Pix antes de liberar."); return;}

  const { error } = await db.from("pedidos").update({liberado:true,status:"Liberado para motoboys"}).eq("id", id);
  if(error){alert("Erro: " + error.message); return;}
  await carregarDados(); render();
}

async function recusarPedido(id){
  const { error } = await db.from("pedidos").update({status:"Recusado pelo admin", liberado:false}).eq("id", id);
  if(error){alert("Erro: " + error.message); return;}
  await carregarDados(); render();
}

async function aceitarPedido(id){
  const { error } = await db.from("pedidos").update({
    status:"Aceito pelo motoboy",
    motoboy_id:sessao.id,
    motoboy_nome:sessao.nome,
    liberado:false
  }).eq("id", id);
  if(error){alert("Erro: " + error.message); return;}
  await carregarDados(); render();
}

async function mudarStatus(id,status){
  const { error } = await db.from("pedidos").update({status}).eq("id", id);
  if(error){alert("Erro: " + error.message); return;}
  await carregarDados(); render();
}

async function excluirPedido(id){
  if(!confirm("Excluir esse pedido?")) return;
  const { error } = await db.from("pedidos").delete().eq("id", id);
  if(error){alert("Erro: " + error.message); return;}
  await carregarDados(); render();
}

async function pagarMotoboy(id){
  const m = motoboys.find(x=>x.id===id);
  const corridas = pedidos.filter(p=>p.motoboy_id===id && p.status==="Entrega finalizada" && !p.pago_motoboy);
  if(corridas.length===0){alert("Esse motoboy não tem valor em aberto.");return}

  const bruto = corridas.reduce((t,p)=>t+Number(p.valor || 0),0);
  const liquido = bruto*(100-TAXA_ROTA)/100;
  if(!confirm("Confirmar pagamento para " + m.nome + " no valor de " + dinheiro(liquido) + "?")) return;

  const ids = corridas.map(p=>p.id);
  const { error } = await db.from("pedidos").update({
    pago_motoboy:true,
    data_pagamento: new Date().toLocaleString("pt-BR")
  }).in("id", ids);
  if(error){alert("Erro: " + error.message); return;}

  await carregarDados();
  render();
  alert("Pagamento marcado como pago. O saldo do motoboy foi zerado.");
}

function copiar(texto){
  if(navigator.clipboard){navigator.clipboard.writeText(texto);}
  alert("Chave Pix copiada!");
}

function clienteHTML(){
  let meus = pedidos.filter(p=>String(p.cliente_id)===String(sessao.id));
  return `
    <div class="card">
      <h2>Olá, ${sessao.nome}</h2>
      <p>Pagamento aceito: <b>somente Pix</b></p>
      <div class="pixbox">Chave Pix Rota Express: <b>${PIX_ROTA}</b><br>Nome: <b>${PIX_NOME}</b></div>
    </div>
    <div class="card">
      <h2>Solicitar entrega</h2>
      <input id="loja" placeholder="Nome da loja">
      <input id="coleta" placeholder="Endereço de coleta">
      <input id="entrega" placeholder="Endereço de entrega">
      <input id="km" type="number" step="0.1" placeholder="Distância em KM">
      <textarea id="obs" placeholder="Observação"></textarea>
      <button class="main" onclick="criarPedidoCliente()">Gerar entrega com valor Pix</button>
    </div>
    <h2>Meus pedidos</h2>
    ${meus.map(cardPedidoCliente).join("") || "<p>Nenhum pedido.</p>"}
  `;
}

function adminHTML(){
  let total = pedidos.reduce((t,p)=>t+Number(p.valor || 0),0);
  let rota = pedidos.filter(p=>p.status==="Entrega finalizada" && !p.pago_motoboy).reduce((t,p)=>t+(Number(p.valor || 0)*TAXA_ROTA/100),0);
  let aPagar = pedidos.filter(p=>p.status==="Entrega finalizada" && !p.pago_motoboy).reduce((t,p)=>t+(Number(p.valor || 0)*(100-TAXA_ROTA)/100),0);
  return `
    <div class="stats">
      <div class="stat"><span>Total bruto</span><b>${dinheiro(total)}</b></div>
      <div class="stat"><span>Sua parte ${TAXA_ROTA}%</span><b>${dinheiro(rota)}</b></div>
      <div class="stat"><span>Pagar motoboys</span><b>${dinheiro(aPagar)}</b></div>
      <div class="stat"><span>Fechamento</span><b>00:00</b></div>
    </div>
    <div class="card">
      <h2>Configuração Pix</h2>
      <p><b>Chave:</b> ${PIX_ROTA}</p>
      <p><b>Nome:</b> ${PIX_NOME}</p>
      <button class="gray" onclick="carregarDados().then(render)">Atualizar dados</button>
    </div>
    <h2>Pedidos para aprovar</h2>
    ${pedidos.map(cardPedidoAdmin).join("") || "<p>Nenhum pedido.</p>"}
    <h2>Motoboys cadastrados</h2>
    ${motoboys.map(cardMotoboyAdmin).join("") || "<p>Nenhum motoboy.</p>"}
  `;
}

function motoboyHTML(){
  let liberados = pedidos.filter(p=>p.liberado && p.pagamento_status==="Pix confirmado" && !p.motoboy_id);
  let meus = pedidos.filter(p=>String(p.motoboy_id)===String(sessao.id));
  let finalizadosHoje = meus.filter(p=>p.status==="Entrega finalizada" && !p.pago_motoboy);
  let bruto = finalizadosHoje.reduce((t,p)=>t+Number(p.valor || 0),0);
  let taxa = bruto*TAXA_ROTA/100;
  let liquido = bruto-taxa;
  return `
    <div class="card">
      <h2>Perfil do motoboy</h2>
      <p><b>Nome:</b> ${sessao.nome}</p>
      <p><b>WhatsApp:</b> ${sessao.whats}</p>
      <p><b>Pix:</b> ${sessao.pix || "Não informado"}</p>
      <p><b>Pagamento:</b> todo dia às 00:00</p>
      <button class="gray" onclick="carregarDados().then(render)">Atualizar corridas</button>
    </div>
    <div class="stats">
      <div class="stat"><span>Entregas em aberto</span><b>${finalizadosHoje.length}</b></div>
      <div class="stat"><span>Faturado</span><b>${dinheiro(bruto)}</b></div>
      <div class="stat"><span>Taxa Rota ${TAXA_ROTA}%</span><b>${dinheiro(taxa)}</b></div>
      <div class="stat"><span>Você recebe</span><b>${dinheiro(liquido)}</b></div>
    </div>
    <h2>Corridas liberadas</h2>
    ${liberados.map(cardPedidoMotoboy).join("") || "<p>Nenhuma corrida liberada.</p>"}
    <h2>Minhas corridas</h2>
    ${meus.map(cardPedidoMotoboy).join("") || "<p>Nenhuma corrida sua.</p>"}
  `;
}

function baseCard(p){
  return `
    <p><b>Cliente:</b> ${p.cliente_nome || ""}</p>
    <p><b>Loja:</b> ${p.loja || ""}</p>
    <p><b>Coleta:</b> ${p.coleta || ""}</p>
    <p><b>Entrega:</b> ${p.entrega || ""}</p>
    <p><b>KM:</b> ${p.km || ""}</p>
    ${p.obs?`<p><b>Obs:</b> ${p.obs}</p>`:""}
    <p><b>Pagamento:</b> Pix — ${p.pagamento_status || ""}</p>
    ${p.pago_motoboy ? `<p><b>Motoboy:</b> Pago em ${p.data_pagamento || ""}</p>` : ""}
    <h3>${dinheiro(p.valor)}</h3>
  `;
}

function cardPedidoCliente(p){
  return `<div class="order"><b>#${p.id}</b> <span class="badge">${p.status}</span>${baseCard(p)}${blocoPixPedido(p)}</div>`;
}

function cardPedidoAdmin(p){
  return `<div class="order">
    <b>#${p.id}</b> <span class="badge">${p.status}</span>
    ${baseCard(p)}
    ${blocoPixPedido(p)}
    <p><b>Motoboy:</b> ${p.motoboy_nome || "Nenhum"}</p>
    <div class="row">
      <button class="yellow" onclick="confirmarPix(${p.id})">Confirmar Pix</button>
      <button class="green" onclick="liberarPedido(${p.id})">Liberar</button>
      <button class="blue" onclick="mudarStatus(${p.id},'Entrega finalizada')">Finalizar</button>
      <button class="red" onclick="recusarPedido(${p.id})">Recusar</button>
    </div>
    <button class="red" onclick="excluirPedido(${p.id})">Excluir pedido</button>
  </div>`;
}

function cardPedidoMotoboy(p){
  return `<div class="order">
    <b>#${p.id}</b> <span class="badge">${p.status}</span>
    ${baseCard(p)}
    <a class="btn gray" target="_blank" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(p.entrega || "")}">Abrir rota no Maps</a>
    ${!p.motoboy_id?`<button class="yellow" onclick="aceitarPedido(${p.id})">Aceitar corrida</button>`:""}
    ${String(p.motoboy_id)===String(sessao.id)?`
      <button class="blue" onclick="mudarStatus(${p.id},'Pedido coletado')">Pedido coletado</button>
      <button class="green" onclick="mudarStatus(${p.id},'Entrega finalizada')">Finalizar entrega</button>`:""}
  </div>`;
}

function cardMotoboyAdmin(m){
  let abertos = pedidos.filter(p=>String(p.motoboy_id)===String(m.id) && p.status==="Entrega finalizada" && !p.pago_motoboy);
  let pagos = pedidos.filter(p=>String(p.motoboy_id)===String(m.id) && p.pago_motoboy);
  let bruto = abertos.reduce((t,p)=>t+Number(p.valor || 0),0);
  let liquido = bruto*(100-TAXA_ROTA)/100;
  return `<div class="order">
    <b>${m.nome}</b>
    <p><b>WhatsApp:</b> ${m.telefone}</p>
    <p><b>Pix:</b> ${m.pix || "Não informado"}</p>
    <p><b>Entregas em aberto:</b> ${abertos.length}</p>
    <p><b>Bruto em aberto:</b> ${dinheiro(bruto)}</p>
    <p><b>Desconto Rota ${TAXA_ROTA}%:</b> ${dinheiro(bruto*TAXA_ROTA/100)}</p>
    <h3>Recebe agora: ${dinheiro(liquido)}</h3>
    <button class="yellow" onclick="copiar('${m.pix || ""}')">Copiar Pix do motoboy</button>
    <button class="green" onclick="pagarMotoboy(${m.id})">Marcar como pago e zerar saldo</button>
    <p class="small"><b>Histórico pago:</b> ${pagos.length} entregas já pagas.</p>
  </div>`;
}

async function render(){
  if(!sessao){showOnly("loginArea");return}
  showOnly("sistema");
  ["clienteArea","adminArea","motoboyArea"].forEach(x=>document.getElementById(x).classList.add("hide"));
  if(sessao.tipo==="cliente"){clienteArea.classList.remove("hide"); clienteArea.innerHTML=clienteHTML()}
  if(sessao.tipo==="admin"){adminArea.classList.remove("hide"); adminArea.innerHTML=adminHTML()}
  if(sessao.tipo==="motoboy"){motoboyArea.classList.remove("hide"); motoboyArea.innerHTML=motoboyHTML()}
}

async function iniciar(){
  if(sessao){
    await carregarDados();
  }
  render();
}

iniciar();
</script>
</body>
</html>
