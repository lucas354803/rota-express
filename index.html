<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rota Express</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<style>
body{font-family:Arial;background:#111;color:#fff;padding:20px}
.box{background:#1e1e1e;padding:20px;border-radius:10px;max-width:400px;margin:auto}
input,button{width:100%;margin:5px 0;padding:10px;border:none;border-radius:5px}
button{background:#f1b300;color:#000;font-weight:bold}
</style>
</head>
<body>

<div class="box">
<h2>Login</h2>
<input id="tel" placeholder="Telefone">
<input id="senha" placeholder="Senha">
<button onclick="login()">Entrar</button>

<h3>Cadastrar</h3>
<input id="nome" placeholder="Nome">
<input id="tel2" placeholder="Telefone">
<input id="senha2" placeholder="Senha">
<select id="tipo">
<option value="cliente">Cliente</option>
<option value="motoboy">Motoboy</option>
</select>
<button onclick="cad()">Cadastrar</button>

<h3>Novo Pedido</h3>
<input id="pedido_nome" placeholder="Nome cliente">
<input id="pedido_tel" placeholder="Telefone">
<input id="valor" placeholder="Valor">
<button onclick="pedido()">Enviar Pedido</button>
</div>

<script>
const supabase = window.supabase.createClient(
"https://dbindrrbdllfozqvmawx.supabase.co",
"sb_publishable_w8lHZFJkXNGcyoThKTjdIA_FtOQ3uG4"
);

async function cad(){
await supabase.from("usuarios").insert({
nome: document.getElementById("nome").value,
telefone: document.getElementById("tel2").value,
senha: document.getElementById("senha2").value,
tipo: document.getElementById("tipo").value
});
alert("cadastrado");
}

async function login(){
let {data} = await supabase.from("usuarios")
.select("*")
.eq("telefone",document.getElementById("tel").value)
.eq("senha",document.getElementById("senha").value)
.single();

if(data){
alert("bem vindo "+data.nome);
}else{
alert("erro login");
}
}

async function pedido(){
await supabase.from("pedidos").insert({
cliente_nome: document.getElementById("pedido_nome").value,
cliente_telefone: document.getElementById("pedido_tel").value,
valor: document.getElementById("valor").value
});
alert("pedido enviado");
}
</script>

</body>
</html>
