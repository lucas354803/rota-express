<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rota Express Entregas</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#0b0b0b;color:white}
    .app{max-width:430px;margin:auto;padding:18px}
    .top{background:linear-gradient(135deg,#ffd21f,#ff9900);color:#111;border-radius:24px;padding:20px;margin-bottom:15px}
    .top h1{margin:0;font-size:28px}
    .top p{margin:5px 0 0;font-weight:bold}
    .tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:15px;background:#1b1b1b;padding:8px;border-radius:18px}
    .tabs button{border:0;border-radius:14px;padding:12px;font-weight:bold;background:transparent;color:#ddd}
    .tabs button.active{background:#ffd21f;color:#111}
    .card{background:white;color:#111;border-radius:22px;padding:18px;margin-bottom:15px}
    input,textarea{width:100%;padding:13px;margin:6px 0;border-radius:14px;border:1px solid #ddd;font-size:15px}
    textarea{resize:none;height:70px}
    button.main{width:100%;border:0;border-radius:16px;background:#111;color:#ffd21f;padding:15px;font-size:16px;font-weight:bold;margin-top:10px}
    .price{background:#eee;border-radius:16px;padding:14px;margin:8px 0}
    .price b{font-size:28px}
    .order{background:#1c1c1c;border:1px solid #333;border-radius:22px;padding:16px;margin-bottom:12px}
    .order h3{margin:0;color:#ffd21f;font-size:25px}
    .badge{display:inline-block;border-radius:999px;padding:6px 10px;background:#ffd21f;color:#111;font-size:12px;font-weight:bold;margin:7px 0}
    .actions button,.actions a{display:block;width:100%;text-align:center;text-decoration:none;border:0;border-radius:14px;padding:12px;margin-top:8px;font-weight:bold}
    .yellow{background:#ffd21f;color:#111}.blue{background:#2483ff;color:white}.green{background:#16a34a;color:white}.red{background:#e11d48;color:white}.maps{background:#333;color:white}
    .stats{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .stat{background:white;color:#111;border-radius:18px;padding:15px}
    .stat span{font-size:12px;color:#666;font-weight:bold}.stat b{display:block;font-size:22px;margin-top:5px}
  </style>
</head>
<body>
  <div class="app">
    <div class="top">
      <h1>🏍️ Rota Express</h1>
      <p>Entregas rápidas na rota certa</p>
    </div>

    <div class="tabs">
      <button id="btnCliente" class="active" onclick="show('cliente')">Cliente</button>
      <button id="btnMotoboy" onclick="show('motoboy')">Motoboy</button>
      <button id="btnAdmin" onclick="show('admin')">Admin</button>
    </div>

    <section id="cliente">
      <div class="card">
        <h2>Chamar motoboy</h2>
        <input id="loja" placeholder="Nome da loja ou cliente">
        <input id="clienteNome" placeholder="Nome do cliente">
        <input id="telefone" placeholder="Telefone / WhatsApp">
        <input id="coleta" placeholder="Endereço de coleta">
        <input id="entrega" placeholder="Endereço de entrega">
        <input id="km" type="number" step="0.1" placeholder="Distância aproximada em KM" oninput="atualizarValor()">
        <textarea id="obs" placeholder="Observação"></textarea>
        <div class="price">Valor da corrida<br><b id="valorPreview">R$ 0,00</b></div>
        <button class="main" onclick="criarPedido()">Solicitar entrega</button>
      </div>
    </section>

    <section id="motoboy" style="display:none">
      <h2>Corridas disponíveis</h2>
      <div id="listaMotoboy"></div>
    </section>

    <section id="admin" style="display:none">
      <div class="stats">
        <div class="stat"><span>ENTREGAS</span><b id="totalEntregas">0</b></div>
        <div class="stat"><span>FATURAMENTO</span><b id="faturamento">R$ 0,00</b></div>
      </div>
      <h2>Painel admin</h2>
      <div id="listaAdmin"></div>
    </section>
  </div>

<script>
let pedidos = JSON.parse(localStorage.getItem("pedidos_rota")) || [];

function dinheiro(v){return v.toLocaleString("pt-BR",{style:"currency",currency:"BRL"})}

function calcular(km){
  km = Number(km || 0);
  if(km <= 0) return 0;
  if(km <= 3) return 8;
  if(km <= 6) return 10;
  return Math.ceil(10 + (km - 6) * 2);
}

function atualizarValor(){
  document.getElementById("valorPreview").innerText = dinheiro(calcular(document.getElementById("km").value));
}

function salvar(){
  localStorage.setItem("pedidos_rota", JSON.stringify(pedidos));
}

function criarPedido(){
  const coleta = document.getElementById("coleta").value;
  const entrega = document.getElementById("entrega").value;
  const km = document.getElementById("km").value;
  if(!coleta || !entrega || !km){ alert("Preencha coleta, entrega e KM"); return; }

  pedidos.unshift({
    id: Date.now(),
    loja: document.getElementById("loja").value || "Cliente avulso",
    cliente: document.getElementById("clienteNome").value || "Sem nome",
    telefone: document.getElementById("telefone").value,
    coleta, entrega,
    obs: document.getElementById("obs").value,
    km: Number(km),
    valor: calcular(km),
    status: "Aguardando motoboy",
    hora: new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"})
  });

  salvar();
  document.querySelectorAll("input,textarea").forEach(i=>i.value="");
  atualizarValor();
  render();
  show("admin");
}

function mudarStatus(id,status){
  pedidos = pedidos.map(p => p.id === id ? {...p,status} : p);
  salvar(); render();
}

function excluir(id){
  pedidos = pedidos.filter(p => p.id !== id);
  salvar(); render();
}

function card(p, admin=false){
  return `
    <div class="order">
      <strong>#${p.id}</strong> <span class="badge">${p.status}</span>
      <p><b>Loja:</b> ${p.loja}</p>
      <p><b>Cliente:</b> ${p.cliente}</p>
      <p><b>Coleta:</b> ${p.coleta}</p>
      <p><b>Entrega:</b> ${p.entrega}</p>
      <p><b>KM:</b> ${p.km} km</p>
      ${p.obs ? `<p><b>Obs:</b> ${p.obs}</p>` : ""}
      <h3>${dinheiro(p.valor)}</h3>
      <div class="actions">
        <a class="maps" target="_blank" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(p.entrega)}">Abrir rota no Maps</a>
        <button class="yellow" onclick="mudarStatus(${p.id},'Corrida aceita')">Aceitar</button>
        <button class="blue" onclick="mudarStatus(${p.id},'Pedido coletado')">Coletado</button>
        <button class="green" onclick="mudarStatus(${p.id},'Entrega finalizada')">Finalizar</button>
        ${admin ? `<button class="red" onclick="excluir(${p.id})">Excluir</button>` : ""}
      </div>
    </div>`;
}

function render(){
  document.getElementById("listaMotoboy").innerHTML = pedidos.map(p=>card(p,false)).join("") || "<p>Nenhuma corrida.</p>";
  document.getElementById("listaAdmin").innerHTML = pedidos.map(p=>card(p,true)).join("") || "<p>Nenhuma entrega.</p>";
  document.getElementById("totalEntregas").innerText = pedidos.length;
  document.getElementById("faturamento").innerText = dinheiro(pedidos.reduce((t,p)=>t+p.valor,0));
}

function show(tela){
  ["cliente","motoboy","admin"].forEach(t=>{
    document.getElementById(t).style.display = t===tela ? "block" : "none";
    document.getElementById("btn"+t.charAt(0).toUpperCase()+t.slice(1)).classList.toggle("active", t===tela);
  });
  render();
}
render();
</script>
</body>
</html>
