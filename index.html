<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rota Express Entregas</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#0b0b0b;color:white}
    .app{max-width:460px;margin:auto;padding:16px}
    .top{background:linear-gradient(135deg,#ffd21f,#ff9900);color:#111;border-radius:24px;padding:20px;margin-bottom:14px}
    .top h1{margin:0;font-size:28px}.top p{margin:5px 0 0;font-weight:bold}
    .card{background:white;color:#111;border-radius:22px;padding:18px;margin-bottom:14px}
    .dark{background:#1c1c1c;color:white;border:1px solid #333}
    input,textarea,select{width:100%;padding:13px;margin:6px 0;border-radius:14px;border:1px solid #ddd;font-size:15px}
    textarea{resize:none;height:70px}
    button,a.btn{width:100%;border:0;border-radius:15px;padding:13px;font-size:15px;font-weight:800;margin-top:8px;text-align:center;text-decoration:none;display:block;cursor:pointer}
    .main{background:#111;color:#ffd21f}.yellow{background:#ffd21f;color:#111}.blue{background:#2563eb;color:white}.green{background:#16a34a;color:white}.red{background:#e11d48;color:white}.gray{background:#333;color:white}
    .hide{display:none}
    .badge{display:inline-block;border-radius:999px;padding:6px 10px;background:#ffd21f;color:#111;font-size:12px;font-weight:bold;margin:5px 0}
    .order{background:#1c1c1c;border:1px solid #333;border-radius:22px;padding:16px;margin-bottom:12px}
    .order h3{margin:8px 0;color:#ffd21f;font-size:25px}.order p{margin:7px 0;color:#ddd}
    .stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
    .stat{background:white;color:#111;border-radius:18px;padding:15px}.stat span{font-size:12px;color:#666;font-weight:bold}.stat b{display:block;font-size:22px;margin-top:5px}
    .small{font-size:13px;color:#aaa}.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .pixbox{background:#eee;border-radius:16px;padding:14px;margin:10px 0;color:#111;word-break:break-word}
    .qr{width:100%;max-width:260px;display:block;margin:12px auto;border-radius:12px;background:white;padding:8px}
  </style>
</head>
<body>
<div class="app">
  <div class="top">
    <h1>🏍️ Rota Express</h1>
    <p>Entregas rápidas na rota certa</p>
  </div>

  <section id="loginArea" class="card">
    <h2>Entrar no sistema</h2>
    <select id="loginTipo">
      <option value="cliente">Cliente</option>
      <option value="motoboy">Motoboy</option>
      <option value="admin">Admin</option>
    </select>
    <input id="loginUser" placeholder="Usuário / telefone">
    <input id="loginSenha" type="password" placeholder="Senha">
    <button class="main" onclick="entrar()">Entrar</button>
    <button class="yellow" onclick="abrirCadastroCliente()">Cadastrar cliente</button>
    <button class="gray" onclick="abrirCadastroMotoboy()">Cadastrar motoboy</button>
    <p class="small">Admin padrão: usuário <b>admin</b> | senha <b>1234</b></p>
  </section>

  <section id="cadastroCliente" class="card hide">
    <h2>Cadastrar cliente</h2>
    <input id="cadCliNome" placeholder="Nome">
    <input id="cadCliTel" placeholder="WhatsApp / usuário">
    <input id="cadCliSenha" type="password" placeholder="Senha">
    <button class="main" onclick="salvarCliente()">Salvar cliente</button>
    <button class="gray" onclick="voltarLogin()">Voltar</button>
  </section>

  <section id="cadastroMotoboy" class="card hide">
    <h2>Cadastrar motoboy</h2>
    <input id="cadMotNome" placeholder="Nome">
    <input id="cadMotWhats" placeholder="WhatsApp / usuário">
    <input id="cadMotPix" placeholder="Chave Pix do motoboy">
    <input id="cadMotSenha" type="password" placeholder="Senha">
    <button class="main" onclick="salvarMotoboy()">Salvar motoboy</button>
    <button class="gray" onclick="voltarLogin()">Voltar</button>
  </section>

  <section id="sistema" class="hide">
    <button class="red" onclick="sair()">Sair</button>
    <div id="clienteArea" class="hide"></div>
    <div id="adminArea" class="hide"></div>
    <div id="motoboyArea" class="hide"></div>
  </section>
</div>

<script>
const TAXA_ROTA = 20;
const PIX_ROTA = "+5548999117385";
const PIX_NOME = "LUCAS ALVES FERNANDES";
const PIX_CIDADE = "CRICIUMA";

let sessao = JSON.parse(localStorage.getItem("rota_sessao")) || null;
let clientes = JSON.parse(localStorage.getItem("rota_clientes")) || [];
let motoboys = JSON.parse(localStorage.getItem("rota_motoboys")) || [];
let pedidos = JSON.parse(localStorage.getItem("rota_pedidos")) || [];

function dinheiro(v){return Number(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"})}
function salvarTudo(){
  localStorage.setItem("rota_clientes",JSON.stringify(clientes));
  localStorage.setItem("rota_motoboys",JSON.stringify(motoboys));
  localStorage.setItem("rota_pedidos",JSON.stringify(pedidos));
  localStorage.setItem("rota_sessao",JSON.stringify(sessao));
}
function calcular(km){
  km = Number(km || 0);
  if(km <= 0) return 0;
  if(km <= 3) return 8;
  if(km <= 6) return 10;
  return Math.ceil(10 + (km - 6) * 2);
}
function emv(id, value){
  value = String(value);
  return id + String(value.length).padStart(2,"0") + value;
}
function crc16(payload){
  let polinomio = 0x1021;
  let resultado = 0xFFFF;
  for(let i=0;i<payload.length;i++){
    resultado ^= payload.charCodeAt(i) << 8;
    for(let j=0;j<8;j++){
      if((resultado & 0x8000) !== 0) resultado = (resultado << 1) ^ polinomio;
      else resultado = resultado << 1;
      resultado &= 0xFFFF;
    }
  }
  return resultado.toString(16).toUpperCase().padStart(4,"0");
}
function gerarPixCopiaCola(valor, txid){
  let merchantAccount = emv("00","BR.GOV.BCB.PIX") + emv("01",PIX_ROTA);
  let payload = "";
  payload += emv("00","01");
  payload += emv("26",merchantAccount);
  payload += emv("52","0000");
  payload += emv("53","986");
  payload += emv("54",Number(valor).toFixed(2));
  payload += emv("58","BR");
  payload += emv("59",PIX_NOME.substring(0,25));
  payload += emv("60",PIX_CIDADE.substring(0,15));
  payload += emv("62",emv("05",("ROTA"+String(txid)).substring(0,25)));
  payload += "6304";
  return payload + crc16(payload);
}
function qrUrl(texto){
  return "https://api.qrserver.com/v1/create-qr-code/?size=260x260&data=" + encodeURIComponent(texto);
}
function blocoPixPedido(p){
  const codigo = gerarPixCopiaCola(p.valor, p.id);
  return `
    <div class="pixbox">
      <b>QR Code Pix automático</b><br>
      Valor: <b>${dinheiro(p.valor)}</b><br>
      Para: ${PIX_NOME}<br>
      Cidade: ${PIX_CIDADE}
      <img class="qr" src="${qrUrl(codigo)}">
      <button class="yellow" onclick="copiarPix(${p.id})">Copiar Pix Copia e Cola</button>
      <textarea readonly style="height:95px;font-size:12px">${codigo}</textarea>
    </div>`;
}
function copiarPix(id){
  const p = pedidos.find(x=>x.id===id);
  if(!p) return;
  const codigo = gerarPixCopiaCola(p.valor, p.id);
  copiar(codigo);
}
function hoje(){return new Date().toISOString().slice(0,10)}
function hora(){return new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"})}

function showOnly(id){
  ["loginArea","cadastroCliente","cadastroMotoboy","sistema"].forEach(x=>document.getElementById(x).classList.add("hide"));
  document.getElementById(id).classList.remove("hide");
}
function abrirCadastroCliente(){showOnly("cadastroCliente")}
function abrirCadastroMotoboy(){showOnly("cadastroMotoboy")}
function voltarLogin(){showOnly("loginArea")}

function salvarCliente(){
  let nome = cadCliNome.value.trim(), tel = cadCliTel.value.trim(), senha = cadCliSenha.value.trim();
  if(!nome || !tel || !senha){alert("Preencha tudo");return}
  clientes.push({id:Date.now(),nome,tel,senha});
  salvarTudo(); alert("Cliente cadastrado"); voltarLogin();
}
function salvarMotoboy(){
  let nome = cadMotNome.value.trim(), whats = cadMotWhats.value.trim(), pix = cadMotPix.value.trim(), senha = cadMotSenha.value.trim();
  if(!nome || !whats || !pix || !senha){alert("Preencha tudo");return}
  motoboys.push({id:Date.now(),nome,whats,pix,senha,ativo:true});
  salvarTudo(); alert("Motoboy cadastrado"); voltarLogin();
}
function entrar(){
  let tipo = loginTipo.value, user = loginUser.value.trim(), senha = loginSenha.value.trim();
  if(tipo==="admin" && user==="admin" && senha==="1234"){sessao={tipo:"admin",nome:"Administrador",id:"admin"}; salvarTudo(); render(); return}
  if(tipo==="cliente"){
    let c = clientes.find(x=>x.tel===user && x.senha===senha);
    if(!c){alert("Cliente não encontrado");return}
    sessao={tipo:"cliente",nome:c.nome,id:c.id,tel:c.tel}; salvarTudo(); render(); return;
  }
  if(tipo==="motoboy"){
    let m = motoboys.find(x=>x.whats===user && x.senha===senha);
    if(!m){alert("Motoboy não encontrado");return}
    sessao={tipo:"motoboy",nome:m.nome,id:m.id,whats:m.whats,pix:m.pix}; salvarTudo(); render(); return;
  }
}
function sair(){sessao=null; localStorage.removeItem("rota_sessao"); render()}

function criarPedidoCliente(){
  let loja = document.getElementById("loja").value.trim();
  let coleta = document.getElementById("coleta").value.trim();
  let entrega = document.getElementById("entrega").value.trim();
  let km = document.getElementById("km").value;
  let obs = document.getElementById("obs").value.trim();
  if(!coleta || !entrega || !km){alert("Preencha coleta, entrega e KM");return}
  pedidos.unshift({
    id:Date.now(), clienteId:sessao.id, clienteNome:sessao.nome, clienteWhats:sessao.tel,
    loja:loja || sessao.nome, coleta, entrega, km:Number(km), valor:calcular(km), obs,
    pagamento:"Pix", pagamentoStatus:"Aguardando confirmação",
    status:"Aguardando admin aprovar", liberado:false, motoboyId:null, motoboyNome:"",
    data:hoje(), hora:hora(), fechamento:"00:00"
  });
  salvarTudo(); render(); alert("Pedido criado. Agora pague pelo QR Code Pix e aguarde a confirmação do admin.");
}
function confirmarPix(id){pedidos=pedidos.map(p=>p.id===id?{...p,pagamentoStatus:"Pix confirmado"}:p);salvarTudo();render()}
function liberarPedido(id){
  const p = pedidos.find(x=>x.id===id);
  if(p && p.pagamentoStatus !== "Pix confirmado"){alert("Confirme o Pix antes de liberar."); return;}
  pedidos=pedidos.map(p=>p.id===id?{...p,liberado:true,status:"Liberado para motoboys"}:p);salvarTudo();render()
}
function recusarPedido(id){pedidos=pedidos.map(p=>p.id===id?{...p,status:"Recusado pelo admin",liberado:false}:p);salvarTudo();render()}
function aceitarPedido(id){
  pedidos=pedidos.map(p=>p.id===id?{...p,status:"Aceito pelo motoboy",motoboyId:sessao.id,motoboyNome:sessao.nome,liberado:false}:p);
  salvarTudo();render();
}
function mudarStatus(id,status){pedidos=pedidos.map(p=>p.id===id?{...p,status}:p);salvarTudo();render()}
function excluirPedido(id){pedidos=pedidos.filter(p=>p.id!==id);salvarTudo();render()}
function copiar(texto){
  if(navigator.clipboard){navigator.clipboard.writeText(texto);}
  alert("Pix copiado!");
}

function clienteHTML(){
  let meus = pedidos.filter(p=>p.clienteId===sessao.id);
  return `
    <div class="card">
      <h2>Olá, ${sessao.nome}</h2>
      <p>Pagamento aceito: <b>somente Pix</b></p>
      <div class="pixbox">Chave Pix Rota Express: <b>48999117385</b><br>O QR Code com valor automático aparece depois que você cria a entrega.</div>
    </div>
    <div class="card">
      <h2>Solicitar entrega</h2>
      <input id="loja" placeholder="Nome da loja">
      <input id="coleta" placeholder="Endereço de coleta">
      <input id="entrega" placeholder="Endereço de entrega">
      <input id="km" type="number" step="0.1" placeholder="Distância em KM">
      <textarea id="obs" placeholder="Observação"></textarea>
      <button class="main" onclick="criarPedidoCliente()">Gerar entrega + QR Pix</button>
    </div>
    <h2>Meus pedidos</h2>
    ${meus.map(cardPedidoCliente).join("") || "<p>Nenhum pedido.</p>"}
  `;
}
function adminHTML(){
  let total = pedidos.reduce((t,p)=>t+p.valor,0);
  let rota = pedidos.filter(p=>p.status==="Entrega finalizada").reduce((t,p)=>t+(p.valor*TAXA_ROTA/100),0);
  let aPagar = pedidos.filter(p=>p.status==="Entrega finalizada").reduce((t,p)=>t+(p.valor*(100-TAXA_ROTA)/100),0);
  return `
    <div class="stats">
      <div class="stat"><span>Total bruto</span><b>${dinheiro(total)}</b></div>
      <div class="stat"><span>Sua parte ${TAXA_ROTA}%</span><b>${dinheiro(rota)}</b></div>
      <div class="stat"><span>Pagar motoboys</span><b>${dinheiro(aPagar)}</b></div>
      <div class="stat"><span>Fechamento</span><b>00:00</b></div>
    </div>
    <div class="card">
      <h2>Configuração Pix</h2>
      <p><b>Chave:</b> 48999117385</p><p class="small">No QR Code, telefone usa formato internacional: +5548999117385</p>
      <p><b>Nome:</b> ${PIX_NOME}</p>
      <p><b>Cidade:</b> ${PIX_CIDADE}</p>
    </div>
    <h2>Pedidos para aprovar</h2>
    ${pedidos.map(cardPedidoAdmin).join("") || "<p>Nenhum pedido.</p>"}
    <h2>Motoboys cadastrados</h2>
    ${motoboys.map(cardMotoboyAdmin).join("") || "<p>Nenhum motoboy.</p>"}
  `;
}
function motoboyHTML(){
  let liberados = pedidos.filter(p=>p.liberado && p.pagamentoStatus==="Pix confirmado" && !p.motoboyId);
  let meus = pedidos.filter(p=>p.motoboyId===sessao.id);
  let finalizadosHoje = meus.filter(p=>p.status==="Entrega finalizada" && p.data===hoje());
  let bruto = finalizadosHoje.reduce((t,p)=>t+p.valor,0);
  let taxa = bruto*TAXA_ROTA/100;
  let liquido = bruto-taxa;
  return `
    <div class="card">
      <h2>Perfil do motoboy</h2>
      <p><b>Nome:</b> ${sessao.nome}</p>
      <p><b>WhatsApp:</b> ${sessao.whats}</p>
      <p><b>Pix:</b> ${sessao.pix}</p>
      <p><b>Pagamento:</b> todo dia às 00:00</p>
    </div>
    <div class="stats">
      <div class="stat"><span>Entregas hoje</span><b>${finalizadosHoje.length}</b></div>
      <div class="stat"><span>Faturado</span><b>${dinheiro(bruto)}</b></div>
      <div class="stat"><span>Taxa Rota ${TAXA_ROTA}%</span><b>${dinheiro(taxa)}</b></div>
      <div class="stat"><span>Você recebe</span><b>${dinheiro(liquido)}</b></div>
    </div>
    <h2>Corridas liberadas</h2>
    ${liberados.map(cardPedidoMotoboy).join("") || "<p>Nenhuma corrida liberada.</p>"}
    <h2>Minhas corridas</h2>
    ${meus.map(cardPedidoMotoboy).join("") || "<p>Nenhuma corrida sua.</p>"}
  `;
}

function baseCard(p){
  return `
    <p><b>Cliente:</b> ${p.clienteNome}</p>
    <p><b>Loja:</b> ${p.loja}</p>
    <p><b>Coleta:</b> ${p.coleta}</p>
    <p><b>Entrega:</b> ${p.entrega}</p>
    <p><b>KM:</b> ${p.km}</p>
    ${p.obs?`<p><b>Obs:</b> ${p.obs}</p>`:""}
    <p><b>Pagamento:</b> Pix — ${p.pagamentoStatus}</p>
    <h3>${dinheiro(p.valor)}</h3>
  `;
}
function cardPedidoCliente(p){
  return `<div class="order"><b>#${p.id}</b> <span class="badge">${p.status}</span>${baseCard(p)}${blocoPixPedido(p)}</div>`;
}
function cardPedidoAdmin(p){
  return `<div class="order">
    <b>#${p.id}</b> <span class="badge">${p.status}</span>
    ${baseCard(p)}
    ${blocoPixPedido(p)}
    <p><b>Motoboy:</b> ${p.motoboyNome || "Nenhum"}</p>
    <div class="row">
      <button class="yellow" onclick="confirmarPix(${p.id})">Confirmar Pix</button>
      <button class="green" onclick="liberarPedido(${p.id})">Liberar</button>
      <button class="blue" onclick="mudarStatus(${p.id},'Entrega finalizada')">Finalizar</button>
      <button class="red" onclick="recusarPedido(${p.id})">Recusar</button>
    </div>
    <button class="red" onclick="excluirPedido(${p.id})">Excluir pedido</button>
  </div>`;
}
function cardPedidoMotoboy(p){
  return `<div class="order">
    <b>#${p.id}</b> <span class="badge">${p.status}</span>
    ${baseCard(p)}
    <a class="btn gray" target="_blank" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(p.entrega)}">Abrir rota no Maps</a>
    ${!p.motoboyId?`<button class="yellow" onclick="aceitarPedido(${p.id})">Aceitar corrida</button>`:""}
    ${p.motoboyId===sessao.id?`
      <button class="blue" onclick="mudarStatus(${p.id},'Pedido coletado')">Pedido coletado</button>
      <button class="green" onclick="mudarStatus(${p.id},'Entrega finalizada')">Finalizar entrega</button>`:""}
  </div>`;
}
function cardMotoboyAdmin(m){
  let meus = pedidos.filter(p=>p.motoboyId===m.id && p.status==="Entrega finalizada" && p.data===hoje());
  let bruto = meus.reduce((t,p)=>t+p.valor,0);
  let liquido = bruto*(100-TAXA_ROTA)/100;
  return `<div class="order">
    <b>${m.nome}</b>
    <p><b>WhatsApp:</b> ${m.whats}</p>
    <p><b>Pix:</b> ${m.pix}</p>
    <p><b>Entregas hoje:</b> ${meus.length}</p>
    <p><b>Bruto:</b> ${dinheiro(bruto)}</p>
    <p><b>Desconto Rota ${TAXA_ROTA}%:</b> ${dinheiro(bruto*TAXA_ROTA/100)}</p>
    <h3>Recebe: ${dinheiro(liquido)}</h3>
    <button class="yellow" onclick="copiar('${m.pix}')">Copiar Pix do motoboy</button>
  </div>`;
}

function render(){
  if(!sessao){showOnly("loginArea");return}
  showOnly("sistema");
  ["clienteArea","adminArea","motoboyArea"].forEach(x=>document.getElementById(x).classList.add("hide"));
  if(sessao.tipo==="cliente"){clienteArea.classList.remove("hide"); clienteArea.innerHTML=clienteHTML()}
  if(sessao.tipo==="admin"){adminArea.classList.remove("hide"); adminArea.innerHTML=adminHTML()}
  if(sessao.tipo==="motoboy"){motoboyArea.classList.remove("hide"); motoboyArea.innerHTML=motoboyHTML()}
}
render();
</script>
</body>
</html>
